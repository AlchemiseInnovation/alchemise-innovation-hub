<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Collection Portal</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      font-family: 'Courier New', Courier, monospace;
      color: #ddd;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background-color: #111;
      padding: 2rem;
      text-align: center;
      border-bottom: 2px solid #222;
    }

    header h1 {
      font-size: 2.5rem;
      color: #ffcc00;
      letter-spacing: 1px;
      margin: 0;
    }

    header p {
      font-size: 1rem;
      color: #888;
      margin-top: 0.5rem;
    }

    .embed-container {
      margin: 3rem auto;
      width: 90%;
      max-width: 1000px;
      background-color: #111;
      padding: 1rem;
      border: 2px solid #333;
      border-radius: 12px;
      box-shadow: 0 0 25px #0ff4;
    }

    iframe {
      width: 100%;
      height: 700px;
      border: none;
      border-radius: 8px;
    }

    footer {
      margin-top: 2rem;
      padding: 1rem;
      font-size: 0.8rem;
      color: #666;
      text-align: center;
    }

      /* LINK BUTTONS */
.link-buttons {
  margin-top: 2rem;
  display: flex;
  gap: 1rem;
  justify-content: center;
}

.link-btn {
  padding: 0.8rem 1.6rem;
  background: #222;
  border: 2px solid #444;
  border-radius: 8px;
  color: #ffcc00;
  text-decoration: none;
  font-weight: bold;
  letter-spacing: 0.5px;
  transition: all 0.25s ease;
}

.link-btn:hover {
  background: #333;
  border-color: #ffcc00;
  color: #fff;
  box-shadow: 0 0 12px #ffcc00aa;
  transform: translateY(-3px);
}

  </style>
</head>
<body>
  <header>
    <h1>🧬 Collection Interface</h1>
    <p>Access themed merchandise & artifacts from the archive</p>
  </header>
    
<div class="link-buttons">
   <a href="https://sportuniverse-ai.netlify.app/" class="link-btn">🏪 Sport Universe Fun</a> 
  <a href="https://alchemiseinnovation.printify.me/" class="link-btn">🏪 Sport Personalise Gifts</a>
  <a href="https://alchemise-innovation.square.site/shop/sport-driven/3ISO4PRMEE4O22HLDUKDFYKL?page=1&limit=30&sort_by=category_order&sort_order=asc" class="link-btn">🧩 Sport Collections</a>
</div>

  <div class="embed-container">
    <!-- Replace below with your shop page URL -->
    <iframe src="https://alchemise-innovation.square.site/shop/sport-driven/3ISO4PRMEE4O22HLDUKDFYKL?page=1&limit=30&sort_by=category_order&sort_order=asc"></iframe>
  </div>

  <footer>
    &copy; 2025 Alchemise Innovation • Lore Layer Active
  </footer>
</body>
</html>
